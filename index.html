<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南平一中七六届（三班）50周年征集邀约 · 倒计时</title>
    <style>
        :root {
            --bg-deep: #0a0a1a;
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.15);
            --gold: #f0c060;
            --gold-light: #fde4a5;
            --gold-deep: #d4943a;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.8);
            --text-label: rgba(255, 255, 255, 0.55);
            --glow-gold: rgba(240, 192, 96, 0.35);
            --glow-soft: rgba(255, 200, 130, 0.2);
            --flip-duration: 0.5s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', 'STSong', 'Songti SC', 'Noto Serif SC', 'Helvetica Neue',
                -apple-system, BlinkMacSystemFont, serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            background: linear-gradient(160deg, #0d0d28 0%, #111133 25%, #0a0f24 50%, #0d0d2e 75%, #0b0b22 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            position: relative;
        }

        /* 粒子Canvas背景 */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* 星空点缀 */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }
            50% {
                opacity: 0.9;
                transform: scale(1.6);
            }
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(14px, 2.8vh, 28px);
            padding: 20px 16px;
            width: 100%;
            max-width: 700px;
            animation: fadeInUp 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            opacity: 0;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== 标题区域 ========== */
        .header-section {
            text-align: center;
            animation: fadeInUp 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) 0.12s forwards;
            opacity: 0;
            display: flex;
            flex-direction: column;
            gap: clamp(6px, 1.2vh, 12px);
        }

        .main-title {
            font-size: clamp(1.7rem, 5.5vw, 3rem);
            font-weight: 900;
            letter-spacing: 0.06em;
            background: linear-gradient(180deg,
                    #fff8e7 0%,
                    #fde4a5 18%,
                    #f0c060 40%,
                    #d4943a 62%,
                    #f0c060 78%,
                    #fde4a5 92%,
                    #fff8e7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            filter: drop-shadow(0 2px 10px rgba(240, 192, 96, 0.5));
            line-height: 1.25;
            text-shadow: none;
        }
        .main-title .highlight-bracket {
            -webkit-text-fill-color: #fde4a5;
            color: #fde4a5;
            filter: none;
        }

        .sub-title {
            font-size: clamp(1.2rem, 3.8vw, 2rem);
            font-weight: 700;
            letter-spacing: 0.08em;
            background: linear-gradient(135deg, #fde4a5 0%, #f0c060 45%, #e8a840 70%, #fde4a5 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            filter: drop-shadow(0 1px 6px rgba(240, 192, 96, 0.4));
            line-height: 1.3;
        }

        /* 倒计时拉开序幕 */
        .lead-text {
            font-size: clamp(0.85rem, 2vw, 1.1rem);
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            animation: fadeInUp 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) 0.22s forwards;
            opacity: 0;
            font-weight: 400;
            position: relative;
            display: inline-block;
        }
        .lead-text::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(240, 192, 96, 0.5), transparent);
        }

        /* 日期范围 */
        .date-range {
            font-size: clamp(0.8rem, 1.8vw, 1rem);
            letter-spacing: 0.08em;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            animation: fadeInUp 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) 0.28s forwards;
            opacity: 0;
            font-weight: 400;
        }
        .date-range .arrow {
            color: var(--gold);
            margin: 0 6px;
            font-weight: 300;
        }

        /* ========== 倒计时网格（2列：天 + 时） ========== */
        .countdown-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: clamp(8px, 2vw, 18px);
            width: 100%;
            max-width: 420px;
            align-items: center;
            animation: fadeInUp 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) 0.36s forwards;
            opacity: 0;
        }

        /* 分隔符 */
        .countdown-separator {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.5);
            animation: colonPulse 2s ease-in-out infinite;
            pointer-events: none;
            user-select: none;
            padding: 0 2px;
        }
        @keyframes colonPulse {
            0%,
            100% {
                opacity: 0.35;
            }
            50% {
                opacity: 0.85;
            }
        }

        /* 倒计时卡片 */
        .countdown-card {
            position: relative;
            background: var(--card-bg);
            border: 1.5px solid var(--card-border);
            border-radius: clamp(14px, 3vw, 20px);
            padding: clamp(14px, 3vw, 22px) clamp(8px, 2vw, 16px);
            text-align: center;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.05),
                0 0 0 1px rgba(255, 255, 255, 0.03);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.35s ease,
                border-color 0.35s ease;
            cursor: default;
            overflow: hidden;
        }
        .countdown-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.3) 30%,
                    rgba(255, 255, 255, 0.5) 50%,
                    rgba(255, 255, 255, 0.3) 70%,
                    transparent 100%);
            opacity: 0.6;
            z-index: 1;
        }
        .countdown-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 15%;
            right: 15%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(240, 192, 96, 0.4), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .countdown-card:hover {
            transform: translateY(-4px);
            box-shadow:
                0 14px 40px rgba(0, 0, 0, 0.4),
                0 0 30px var(--glow-soft),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border-color: rgba(240, 192, 96, 0.4);
        }
        .countdown-card:hover::after {
            opacity: 1;
        }
        .countdown-card:active {
            transform: scale(0.96);
            transition: transform 0.15s ease;
        }

        /* 卡片呼吸光晕 */
        .countdown-card.card-glow {
            animation: cardGlowPulse 3s ease-in-out infinite;
        }
        .countdown-card.card-glow:nth-child(1) {
            animation-delay: 0s;
        }
        .countdown-card.card-glow:nth-child(3) {
            animation-delay: 1.5s;
        }
        @keyframes cardGlowPulse {
            0%,
            100% {
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 8px rgba(240, 192, 96, 0.08);
            }
            50% {
                box-shadow: 0 8px 36px rgba(0, 0, 0, 0.35), 0 0 22px rgba(240, 192, 96, 0.22);
            }
        }

        /* ========== 翻牌时钟核心样式 ========== */
        .flip-unit {
            position: relative;
            width: 100%;
            perspective: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .flip-card {
            position: relative;
            width: 100%;
            height: auto;
            transform-style: preserve-3d;
            transition: transform var(--flip-duration) cubic-bezier(0.4, 0.0, 0.2, 1);
            transform: rotateX(0deg);
        }

        .flip-card.flipping {
            transform: rotateX(-180deg);
        }

        .flip-face {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            font-size: inherit;
            font-weight: inherit;
            letter-spacing: inherit;
            color: #ffffff;
            line-height: 1;
            min-height: 1em;
            padding: 0.1em 0;
        }

        .flip-front {}

        .flip-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotateX(180deg);
        }

        .flip-back span {
            display: inline-block;
            transform: rotateX(180deg);
        }

        .countdown-number-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .countdown-number {
            font-size: clamp(2.6rem, 8vw, 4.8rem);
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #ffffff;
            line-height: 1;
            transition: color 0.2s ease;
            animation: none !important;
        }

        .countdown-label {
            display: block;
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            letter-spacing: 0.14em;
            color: var(--text-label);
            margin-top: clamp(6px, 1.2vh, 10px);
            font-weight: 500;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 600px) {
            .countdown-grid {
                gap: 10px;
                max-width: 320px;
            }
            .countdown-separator {
                font-size: 1.6rem;
                padding: 0 1px;
            }
            .countdown-card {
                padding: 16px 8px;
                border-radius: 16px;
            }
            .countdown-number {
                font-size: clamp(2.4rem, 11vw, 3.6rem);
            }
            .countdown-label {
                font-size: 0.7rem;
                margin-top: 5px;
            }
            .main-title {
                font-size: clamp(1.5rem, 7vw, 2rem);
                letter-spacing: 0.04em;
            }
            .sub-title {
                font-size: clamp(1rem, 5vw, 1.4rem);
                letter-spacing: 0.05em;
            }
            .lead-text {
                font-size: 0.78rem;
                letter-spacing: 0.1em;
            }
            .date-range {
                font-size: 0.7rem;
            }
            .main-container {
                gap: 12px;
                padding: 16px 12px;
            }
        }

        @media (max-width: 360px) {
            .countdown-grid {
                gap: 6px;
                max-width: 270px;
            }
            .countdown-card {
                padding: 12px 4px;
                border-radius: 12px;
            }
            .countdown-number {
                font-size: 2rem;
            }
            .countdown-label {
                font-size: 0.6rem;
                margin-top: 3px;
            }
            .countdown-separator {
                font-size: 1.3rem;
            }
            .main-title {
                font-size: 1.3rem;
            }
            .sub-title {
                font-size: 0.9rem;
            }
            .lead-text {
                font-size: 0.68rem;
            }
            .date-range {
                font-size: 0.62rem;
            }
            .main-container {
                gap: 10px;
                padding: 12px 8px;
            }
        }

        @media (min-width: 900px) {
            .countdown-card:hover {
                transform: translateY(-6px);
                box-shadow:
                    0 18px 50px rgba(0, 0, 0, 0.45),
                    0 0 40px var(--glow-soft),
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
            }
            .countdown-number {
                font-size: 5rem;
            }
            .countdown-grid {
                max-width: 500px;
                gap: 22px;
            }
            .main-title {
                font-size: 3.2rem;
            }
            .sub-title {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- 星空背景 -->
    <div class="stars-container" id="starsContainer" aria-hidden="true"></div>

    <!-- 粒子画布 -->
    <canvas id="particleCanvas" aria-hidden="true"></canvas>

    <!-- 主内容 -->
    <div class="main-container">
        <!-- 标题区域 -->
        <div class="header-section">
            <h1 class="main-title">南平一中七六届<span class="highlight-bracket">（</span>三班<span class="highlight-bracket">）</span></h1>
            <p class="sub-title">50周年征集邀约</p>
        </div>

        <!-- 倒计时拉开序幕 -->
        <p class="lead-text">倒计时拉开序幕</p>

        <!-- 日期范围 -->
        <p class="date-range">2026年5月22日<span class="arrow">——</span>7月11日</p>

        <!-- 倒计时区域（仅天+时，翻牌动画） -->
        <div class="countdown-grid" id="countdownGrid">
            <!-- 天 -->
            <div class="countdown-card card-glow" data-unit="days">
                <div class="countdown-number-wrapper">
                    <div class="flip-unit">
                        <div class="flip-card" id="flipCardDays">
                            <div class="flip-face flip-front countdown-number" id="daysFront">00</div>
                            <div class="flip-face flip-back countdown-number" id="daysBack"><span>00</span></div>
                        </div>
                    </div>
                    <span class="countdown-label">天</span>
                </div>
            </div>
            <!-- 分隔符 -->
            <div class="countdown-separator" aria-hidden="true">:</div>
            <!-- 时 -->
            <div class="countdown-card card-glow" data-unit="hours">
                <div class="countdown-number-wrapper">
                    <div class="flip-unit">
                        <div class="flip-card" id="flipCardHours">
                            <div class="flip-face flip-front countdown-number" id="hoursFront">00</div>
                            <div class="flip-face flip-back countdown-number" id="hoursBack"><span>00</span></div>
                        </div>
                    </div>
                    <span class="countdown-label">时</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============ 目标时间：2026年5月22日 00:00:00 ============
            const targetDate = new Date(2026, 6, 11, 0, 0, 0); // 月份从0开始，4=5月
            const targetTime = targetDate.getTime();

            // 翻牌卡片元素
            const flipCards = {
                days: document.getElementById('flipCardDays'),
                hours: document.getElementById('flipCardHours'),
            };
            const frontFaces = {
                days: document.getElementById('daysFront'),
                hours: document.getElementById('hoursFront'),
            };
            const backFaces = {
                days: document.getElementById('daysBack'),
                hours: document.getElementById('hoursBack'),
            };

            // 记录当前显示的数字
            const currentValues = {
                days: null,
                hours: null,
            };

            // 翻转锁
            const isFlipping = {
                days: false,
                hours: false,
            };

            // ============ 星空生成 ============
            const starsContainer = document.getElementById('starsContainer');

            function createStars() {
                const count = window.innerWidth < 600 ? 50 : 100;
                let html = '';
                for (let i = 0; i < count; i++) {
                    const size = Math.random() * 2.5 + 1;
                    const x = Math.random() * 100;
                    const y = Math.random() * 100;
                    const dur = Math.random() * 3 + 2.5;
                    const delay = Math.random() * 4;
                    html +=
                        `<div class="star" style="left:${x}%;top:${y}%;width:${size}px;height:${size}px;--dur:${dur}s;--delay:${delay}s;"></div>`;
                }
                starsContainer.innerHTML = html;
            }
            createStars();

            // ============ Canvas粒子系统 ============
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const isMobile = window.innerWidth < 600;
            const particleCount = isMobile ? 28 : 55;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', () => {
                resizeCanvas();
                const newIsMobile = window.innerWidth < 600;
                const newCount = newIsMobile ? 28 : 55;
                while (particles.length < newCount) particles.push(createParticle());
                while (particles.length > newCount) particles.pop();
            });

            function createParticle() {
                return {
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 3.5 + 1.2,
                    speedY: Math.random() * 0.7 + 0.3,
                    speedX: Math.random() * 0.5 - 0.25,
                    wobbleAmp: Math.random() * 1.8 + 0.4,
                    wobbleSpeed: Math.random() * 0.02 + 0.008,
                    wobbleOffset: Math.random() * Math.PI * 2,
                    opacity: Math.random() * 0.55 + 0.25,
                    hue: Math.random() * 30 + 30,
                    saturation: Math.random() * 40 + 60,
                    lightness: Math.random() * 25 + 65,
                    shape: Math.random() < 0.3 ? 'diamond' : 'circle',
                };
            }
            for (let i = 0; i < particleCount; i++) particles.push(createParticle());

            function drawParticle(p) {
                ctx.save();
                ctx.globalAlpha = p.opacity;
                const color = `hsl(${p.hue}, ${p.saturation}%, ${p.lightness}%)`;
                if (p.shape === 'diamond') {
                    const cx = p.x,
                        cy = p.y,
                        s = p.size;
                    ctx.fillStyle = color;
                    ctx.shadowColor = color;
                    ctx.shadowBlur = s * 2.5;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy - s);
                    ctx.lineTo(cx + s * 0.7, cy);
                    ctx.lineTo(cx, cy + s);
                    ctx.lineTo(cx - s * 0.7, cy);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                    gradient.addColorStop(0, color);
                    gradient.addColorStop(0.5, `hsla(${p.hue}, ${p.saturation}%, ${p.lightness}%, 0.5)`);
                    gradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient;
                    ctx.shadowColor = color;
                    ctx.shadowBlur = p.size * 3;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }

            function updateParticle(p) {
                p.y += p.speedY;
                p.x += p.speedX + Math.sin(p.wobbleOffset + performance.now() * p.wobbleSpeed) * p.wobbleAmp * 0.3;
                p.wobbleOffset += p.wobbleSpeed * 0.5;
                if (p.y > canvas.height + p.size * 3) {
                    p.y = -p.size * 4;
                    p.x = Math.random() * canvas.width;
                }
                if (p.x > canvas.width + p.size * 2) p.x = -p.size * 2;
                if (p.x < -p.size * 2) p.x = canvas.width + p.size * 2;
                p.opacity += Math.sin(performance.now() * 0.001 + p.wobbleOffset) * 0.003;
                p.opacity = Math.max(0.15, Math.min(0.7, p.opacity));
            }

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (const p of particles) {
                    updateParticle(p);
                    drawParticle(p);
                }
                requestAnimationFrame(animateParticles);
            }
            animateParticles();

            // ============ 翻牌动画核心 ============
            function padZero(num) {
                return String(num).padStart(2, '0');
            }

            function triggerFlip(unit, newValueStr) {
                if (isFlipping[unit]) {
                    // 强制完成当前翻转
                    const card = flipCards[unit];
                    card.classList.remove('flipping');
                    frontFaces[unit].textContent = newValueStr;
                    backFaces[unit].querySelector('span').textContent = newValueStr;
                    isFlipping[unit] = false;
                    return;
                }

                const card = flipCards[unit];
                const backSpan = backFaces[unit].querySelector('span');
                backSpan.textContent = newValueStr;
                isFlipping[unit] = true;
                card.classList.add('flipping');

                const onTransitionEnd = () => {
                    card.removeEventListener('transitionend', onTransitionEnd);
                    frontFaces[unit].textContent = newValueStr;
                    card.classList.remove('flipping');
                    isFlipping[unit] = false;
                };
                card.addEventListener('transitionend', onTransitionEnd);
            }

            function updateCountdown() {
                const now = Date.now();
                const diff = targetTime - now;

                if (diff <= 0) {
                    // 倒计时结束——征集已拉开序幕
                    const leadText = document.querySelector('.lead-text');
                    if (leadText && !leadText.dataset.updated) {
                        leadText.textContent = '🎉 征集进行中';
                        leadText.dataset.updated = '1';
                        leadText.style.color = 'rgba(240,192,96,0.9)';
                    }
                    ['days', 'hours'].forEach(u => {
                        if (currentValues[u] !== '00') {
                            triggerFlip(u, '00');
                            currentValues[u] = '00';
                        }
                    });
                    return;
                }

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

                const daysStr = padZero(days);
                const hoursStr = padZero(hours);

                if (currentValues.days !== daysStr) {
                    triggerFlip('days', daysStr);
                    currentValues.days = daysStr;
                }
                if (currentValues.hours !== hoursStr) {
                    triggerFlip('hours', hoursStr);
                    currentValues.hours = hoursStr;
                }
            }

            // 初始化显示
            function initDisplay() {
                const now = Date.now();
                const diff = targetTime - now;
                if (diff <= 0) {
                    ['days', 'hours'].forEach(u => {
                        frontFaces[u].textContent = '00';
                        backFaces[u].querySelector('span').textContent = '00';
                        currentValues[u] = '00';
                    });
                    const leadText = document.querySelector('.lead-text');
                    if (leadText) {
                        leadText.textContent = '🎉 征集进行中';
                        leadText.style.color = 'rgba(240,192,96,0.9)';
                    }
                    return;
                }
                const days = padZero(Math.floor(diff / (1000 * 60 * 60 * 24)));
                const hours = padZero(Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)));
                const vals = { days, hours };
                for (let u in vals) {
                    frontFaces[u].textContent = vals[u];
                    backFaces[u].querySelector('span').textContent = vals[u];
                    currentValues[u] = vals[u];
                }
            }

            initDisplay();
            const intervalId = setInterval(updateCountdown, 1000);

            // 页面可见性处理
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    clearInterval(intervalId);
                } else {
                    updateCountdown();
                    setInterval(updateCountdown, 1000);
                }
            });

            // 窗口大小变化时重建星空
            let resizeDebounce;
            window.addEventListener('resize', () => {
                clearTimeout(resizeDebounce);
                resizeDebounce = setTimeout(() => {
                    createStars();
                }, 400);
            });

            // 卡片点击反馈
            document.querySelectorAll('.countdown-card').forEach(card => {
                card.addEventListener('click', function() {
                    this.style.borderColor = 'rgba(240,192,96,0.7)';
                    this.style.boxShadow =
                        '0 8px 32px rgba(0,0,0,0.3), 0 0 30px rgba(240,192,96,0.5), inset 0 1px 0 rgba(255,255,255,0.1)';
                    setTimeout(() => {
                        this.style.borderColor = '';
                        this.style.boxShadow = '';
                    }, 350);
                });
            });

            console.log('🎓 南平一中七六届（三班）50周年征集邀约 · 倒计时已启动');
            console.log('📅 目标时间：2026年5月22日 00:00:00');
            console.log('⏳ 活动时间：2026年5月22日 —— 7月11日');
            console.log('💡 修改目标日期请编辑JS中 targetDate 变量（第430行附近）');
        })();
    </script>
</body>
</html>
