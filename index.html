<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老同学聚会倒计时</title>
    <style>
        :root {
            --bg-deep: #0a0a1a;
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.15);
            --gold: #f0c060;
            --gold-light: #fde4a5;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.75);
            --text-label: rgba(255, 255, 255, 0.55);
            --glow-gold: rgba(240, 192, 96, 0.35);
            --glow-soft: rgba(255, 200, 130, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            background: linear-gradient(160deg, #0d0d28 0%, #111133 25%, #0a0f24 50%, #0d0d2e 75%, #0b0b22 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            position: relative;
        }

        /* ============ Canvas 背景层 ============ */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ============ 星空点缀 ============ */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }
            50% {
                opacity: 0.9;
                transform: scale(1.6);
            }
        }

        /* ============ 主内容容器 ============ */
        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(20px, 4vh, 36px);
            padding: 20px;
            width: 100%;
            max-width: 700px;
            animation: fadeInUp 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            opacity: 0;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ 标题区域 ============ */
        .header-section {
            text-align: center;
            animation: fadeInUp 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) 0.15s forwards;
            opacity: 0;
        }
        .subtitle-tag {
            display: inline-block;
            font-size: clamp(0.7rem, 1.6vw, 0.85rem);
            letter-spacing: 0.25em;
            color: var(--gold-light);
            text-transform: uppercase;
            background: rgba(240, 192, 96, 0.1);
            border: 1px solid rgba(240, 192, 96, 0.25);
            border-radius: 50px;
            padding: 6px 18px;
            margin-bottom: 10px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .main-title {
            font-size: clamp(1.5rem, 4.5vw, 2.4rem);
            font-weight: 700;
            letter-spacing: 0.04em;
            background: linear-gradient(135deg, #fde4a5 0%, #f0c060 35%, #e8a840 65%, #fde4a5 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            text-shadow: none;
            filter: drop-shadow(0 2px 8px rgba(240, 192, 96, 0.4));
            line-height: 1.3;
        }
        .main-title .emoji-decor {
            display: inline-block;
            -webkit-text-fill-color: initial;
            color: initial;
            filter: none;
            animation: floatEmoji 3s ease-in-out infinite;
        }
        .main-title .emoji-decor:nth-child(1) {
            animation-delay: 0s;
        }
        .main-title .emoji-decor:nth-child(2) {
            animation-delay: 1.5s;
        }
        @keyframes floatEmoji {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            30% {
                transform: translateY(-8px) rotate(5deg);
            }
            60% {
                transform: translateY(-3px) rotate(-3deg);
            }
            80% {
                transform: translateY(-6px) rotate(2deg);
            }
        }

        /* ============ 倒计时卡片网格 ============ */
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(10px, 2.5vw, 20px);
            width: 100%;
            max-width: 600px;
            animation: fadeInUp 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) 0.3s forwards;
            opacity: 0;
        }

        /* 分隔符 */
        .countdown-separator {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.5);
            animation: colonPulse 2s ease-in-out infinite;
            pointer-events: none;
            user-select: none;
        }
        @keyframes colonPulse {
            0%,
            100% {
                opacity: 0.35;
            }
            50% {
                opacity: 0.85;
            }
        }

        /* 单个倒计时卡片 */
        .countdown-card {
            position: relative;
            background: var(--card-bg);
            border: 1.5px solid var(--card-border);
            border-radius: clamp(14px, 3vw, 20px);
            padding: clamp(12px, 2.5vw, 20px) clamp(6px, 1.5vw, 14px);
            text-align: center;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.05),
                0 0 0 1px rgba(255, 255, 255, 0.03);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.35s ease,
                border-color 0.35s ease;
            cursor: default;
            overflow: hidden;
        }
        .countdown-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.3) 30%,
                    rgba(255, 255, 255, 0.5) 50%,
                    rgba(255, 255, 255, 0.3) 70%,
                    transparent 100%);
            opacity: 0.6;
        }
        .countdown-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 15%;
            right: 15%;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(240, 192, 96, 0.4),
                    transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .countdown-card:hover {
            transform: translateY(-4px);
            box-shadow:
                0 14px 40px rgba(0, 0, 0, 0.4),
                0 0 30px var(--glow-soft),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border-color: rgba(240, 192, 96, 0.4);
        }
        .countdown-card:hover::after {
            opacity: 1;
        }
        .countdown-card:active {
            transform: scale(0.96);
            transition: transform 0.15s ease;
        }

        /* 卡片呼吸光晕 */
        .countdown-card.card-glow {
            animation: cardGlowPulse 3s ease-in-out infinite;
        }
        .countdown-card.card-glow:nth-child(1) {
            animation-delay: 0s;
        }
        .countdown-card.card-glow:nth-child(2) {
            animation-delay: 0.75s;
        }
        .countdown-card.card-glow:nth-child(3) {
            animation-delay: 1.5s;
        }
        .countdown-card.card-glow:nth-child(4) {
            animation-delay: 2.25s;
        }
        @keyframes cardGlowPulse {
            0%,
            100% {
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 8px rgba(240, 192, 96, 0.08);
            }
            50% {
                box-shadow: 0 8px 36px rgba(0, 0, 0, 0.35), 0 0 22px rgba(240, 192, 96, 0.22);
            }
        }

        /* 数字 */
        .countdown-number {
            display: block;
            font-size: clamp(2rem, 6vw, 3.6rem);
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #ffffff;
            line-height: 1;
            transition: color 0.2s ease;
            position: relative;
        }
        .countdown-number.bounce {
            animation: numberBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes numberBounce {
            0% {
                transform: scale(1);
            }
            25% {
                transform: scale(0.75);
            }
            55% {
                transform: scale(1.12);
            }
            75% {
                transform: scale(0.94);
            }
            100% {
                transform: scale(1);
            }
        }

        /* 标签 */
        .countdown-label {
            display: block;
            font-size: clamp(0.65rem, 1.4vw, 0.8rem);
            letter-spacing: 0.12em;
            color: var(--text-label);
            margin-top: clamp(4px, 1vh, 8px);
            font-weight: 500;
            text-transform: uppercase;
        }

        /* ============ 聚会信息卡片 ============ */
        .info-card {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(10px, 2vw, 18px);
            justify-content: center;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: clamp(12px, 2.5vw, 18px);
            padding: clamp(12px, 2.5vw, 18px) clamp(16px, 3vw, 28px);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            animation: fadeInUp 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) 0.45s forwards;
            opacity: 0;
            max-width: 600px;
            width: 100%;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: clamp(0.7rem, 1.5vw, 0.85rem);
            color: var(--text-secondary);
            white-space: nowrap;
            letter-spacing: 0.03em;
        }
        .info-icon {
            font-size: 1.1em;
            flex-shrink: 0;
        }
        .info-divider {
            width: 1px;
            height: 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 1px;
            flex-shrink: 0;
        }

        /* ============ 底部提示 ============ */
        .footer-hint {
            font-size: clamp(0.6rem, 1.2vw, 0.7rem);
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.08em;
            text-align: center;
            animation: fadeInUp 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) 0.55s forwards;
            opacity: 0;
            margin-top: -4px;
        }

        /* ============ 响应式布局 ============ */
        @media (max-width: 600px) {
            .countdown-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                max-width: 340px;
            }
            /* 在2x2布局中隐藏分隔符（用卡片间距代替） */
            .countdown-separator {
                display: none;
            }
            .countdown-card {
                padding: 16px 10px;
                border-radius: 16px;
            }
            .countdown-number {
                font-size: clamp(2.2rem, 10vw, 3rem);
            }
            .countdown-label {
                font-size: 0.7rem;
                margin-top: 4px;
            }
            .info-card {
                gap: 8px;
                padding: 12px 14px;
                border-radius: 14px;
            }
            .info-item {
                font-size: 0.7rem;
                gap: 4px;
            }
            .info-divider {
                height: 12px;
            }
            .main-title {
                font-size: clamp(1.4rem, 6vw, 1.9rem);
            }
            .subtitle-tag {
                font-size: 0.65rem;
                padding: 5px 14px;
                letter-spacing: 0.2em;
            }
        }

        @media (max-width: 360px) {
            .countdown-grid {
                gap: 8px;
                max-width: 290px;
            }
            .countdown-card {
                padding: 12px 6px;
                border-radius: 12px;
            }
            .countdown-number {
                font-size: 1.8rem;
            }
            .countdown-label {
                font-size: 0.6rem;
            }
            .info-card {
                padding: 10px 10px;
                gap: 5px;
                border-radius: 12px;
            }
            .info-item {
                font-size: 0.62rem;
            }
            .main-title {
                font-size: 1.2rem;
            }
            .subtitle-tag {
                font-size: 0.6rem;
                padding: 4px 10px;
            }
        }

        /* 大屏幕优化 */
        @media (min-width: 900px) {
            .countdown-card:hover {
                transform: translateY(-6px);
                box-shadow:
                    0 18px 50px rgba(0, 0, 0, 0.45),
                    0 0 40px var(--glow-soft),
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
            }
            .countdown-number {
                font-size: 3.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- 星空背景 -->
    <div class="stars-container" id="starsContainer" aria-hidden="true"></div>

    <!-- 粒子飘落画布 -->
    <canvas id="particleCanvas" aria-hidden="true"></canvas>

    <!-- 主内容 -->
    <div class="main-container">
        <!-- 标题 -->
        <div class="header-section">
            <span class="subtitle-tag">👋 青春不散场</span>
            <h1 class="main-title">
                <span class="emoji-decor">🎓</span>
                老同学聚会倒计时
                <span class="emoji-decor">✨</span>
            </h1>
        </div>

        <!-- 倒计时 -->
        <div class="countdown-grid" id="countdownGrid">
            <!-- 天 -->
            <div class="countdown-card card-glow" data-unit="days">
                <span class="countdown-number" id="daysNum">00</span>
                <span class="countdown-label">天</span>
            </div>
            <!-- 分隔符 -->
            <div class="countdown-separator" aria-hidden="true">:</div>
            <!-- 时 -->
            <div class="countdown-card card-glow" data-unit="hours">
                <span class="countdown-number" id="hoursNum">00</span>
                <span class="countdown-label">时</span>
            </div>
            <!-- 分隔符 -->
            <div class="countdown-separator" aria-hidden="true">:</div>
            <!-- 分 -->
            <div class="countdown-card card-glow" data-unit="minutes">
                <span class="countdown-number" id="minutesNum">00</span>
                <span class="countdown-label">分</span>
            </div>
            <!-- 分隔符 -->
            <div class="countdown-separator" aria-hidden="true">:</div>
            <!-- 秒 -->
            <div class="countdown-card card-glow" data-unit="seconds">
                <span class="countdown-number" id="secondsNum">00</span>
                <span class="countdown-label">秒</span>
            </div>
        </div>

        <!-- 聚会信息 -->
        <div class="info-card">
            <span class="info-item">
                <span class="info-icon">📅</span> 2026年7月18日
            </span>
            <span class="info-divider" aria-hidden="true"></span>
            <span class="info-item">
                <span class="info-icon">⏰</span> 中午 12:00
            </span>
            <span class="info-divider" aria-hidden="true"></span>
            <span class="info-item">
                <span class="info-icon">📍</span> 母校大门口
            </span>
        </div>

        <!-- 底部文字 -->
        <p class="footer-hint">时光不老 · 我们不散 · 期待重逢</p>
    </div>

    <script>
        (function() {
            // ============ 聚会目标时间 ============
            // 可在此修改聚会日期：年、月(0-11)、日、时、分、秒
            const targetDate = new Date(2026, 6, 18, 12, 0, 0); // 2026年7月18日 12:00:00
            // ====================================

            const targetTime = targetDate.getTime();

            // DOM元素
            const daysNumEl = document.getElementById('daysNum');
            const hoursNumEl = document.getElementById('hoursNum');
            const minutesNumEl = document.getElementById('minutesNum');
            const secondsNumEl = document.getElementById('secondsNum');
            const countdownGrid = document.getElementById('countdownGrid');
            const starsContainer = document.getElementById('starsContainer');
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');

            // 上一轮数值（用于检测变化触发弹跳动画）
            let prevValues = { days: -1, hours: -1, minutes: -1, seconds: -1 };

            // ============ 星空生成 ============
            function createStars() {
                const count = window.innerWidth < 600 ? 50 : 100;
                let html = '';
                for (let i = 0; i < count; i++) {
                    const size = Math.random() * 2.5 + 1;
                    const x = Math.random() * 100;
                    const y = Math.random() * 100;
                    const dur = Math.random() * 3 + 2.5;
                    const delay = Math.random() * 4;
                    html +=
                        `<div class="star" style="left:${x}%;top:${y}%;width:${size}px;height:${size}px;--dur:${dur}s;--delay:${delay}s;"></div>`;
                }
                starsContainer.innerHTML = html;
            }
            createStars();

            // ============ Canvas粒子系统 ============
            let particles = [];
            const isMobile = window.innerWidth < 600;
            const particleCount = isMobile ? 28 : 55;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', () => {
                resizeCanvas();
                // 根据新宽度调整粒子数量
                const newIsMobile = window.innerWidth < 600;
                const newCount = newIsMobile ? 28 : 55;
                while (particles.length < newCount) {
                    particles.push(createParticle());
                }
                while (particles.length > newCount) {
                    particles.pop();
                }
            });

            function createParticle() {
                return {
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 3.5 + 1.2,
                    speedY: Math.random() * 0.7 + 0.3,
                    speedX: Math.random() * 0.5 - 0.25,
                    wobbleAmp: Math.random() * 1.8 + 0.4,
                    wobbleSpeed: Math.random() * 0.02 + 0.008,
                    wobbleOffset: Math.random() * Math.PI * 2,
                    opacity: Math.random() * 0.55 + 0.25,
                    hue: Math.random() * 30 + 30, // 30-60 金色到暖橙范围
                    saturation: Math.random() * 40 + 60,
                    lightness: Math.random() * 25 + 65,
                    shape: Math.random() < 0.3 ? 'diamond' : 'circle',
                };
            }

            // 初始化粒子
            for (let i = 0; i < particleCount; i++) {
                particles.push(createParticle());
            }

            function drawParticle(p) {
                ctx.save();
                ctx.globalAlpha = p.opacity;
                const color = `hsl(${p.hue}, ${p.saturation}%, ${p.lightness}%)`;

                if (p.shape === 'diamond') {
                    // 小菱形/星形粒子
                    const cx = p.x;
                    const cy = p.y;
                    const s = p.size;
                    ctx.fillStyle = color;
                    ctx.shadowColor = color;
                    ctx.shadowBlur = s * 2.5;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy - s);
                    ctx.lineTo(cx + s * 0.7, cy);
                    ctx.lineTo(cx, cy + s);
                    ctx.lineTo(cx - s * 0.7, cy);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    // 圆形光点
                    const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                    gradient.addColorStop(0, color);
                    gradient.addColorStop(0.5, `hsla(${p.hue}, ${p.saturation}%, ${p.lightness}%, 0.5)`);
                    gradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient;
                    ctx.shadowColor = color;
                    ctx.shadowBlur = p.size * 3;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }

            function updateParticle(p) {
                p.y += p.speedY;
                p.x += p.speedX + Math.sin(p.wobbleOffset + performance.now() * p.wobbleSpeed) * p.wobbleAmp *
                    0.3;
                p.wobbleOffset += p.wobbleSpeed * 0.5;

                // 重置到顶部
                if (p.y > canvas.height + p.size * 3) {
                    p.y = -p.size * 4;
                    p.x = Math.random() * canvas.width;
                }
                // 水平循环
                if (p.x > canvas.width + p.size * 2) p.x = -p.size * 2;
                if (p.x < -p.size * 2) p.x = canvas.width + p.size * 2;

                // 微小的透明度波动
                p.opacity += (Math.sin(performance.now() * 0.001 + p.wobbleOffset) * 0.003);
                p.opacity = Math.max(0.15, Math.min(0.7, p.opacity));
            }

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (const p of particles) {
                    updateParticle(p);
                    drawParticle(p);
                }
                requestAnimationFrame(animateParticles);
            }
            animateParticles();

            // ============ 倒计时逻辑 ============
            function padZero(num) {
                return String(num).padStart(2, '0');
            }

            function triggerBounce(el) {
                el.classList.remove('bounce');
                void el.offsetWidth; // 强制回流以重新触发动画
                el.classList.add('bounce');
            }

            function updateCountdown() {
                const now = Date.now();
                const diff = targetTime - now;

                if (diff <= 0) {
                    // 聚会时间已到或已过
                    daysNumEl.textContent = '00';
                    hoursNumEl.textContent = '00';
                    minutesNumEl.textContent = '00';
                    secondsNumEl.textContent = '00';
                    // 更新标题
                    const title = document.querySelector('.main-title');
                    if (title && !title.dataset.updated) {
                        title.innerHTML =
                            '<span class="emoji-decor">🎉</span> 聚会时间到！<span class="emoji-decor">🥳</span>';
                        title.dataset.updated = '1';
                    }
                    const subtitle = document.querySelector('.subtitle-tag');
                    if (subtitle && !subtitle.dataset.updated) {
                        subtitle.textContent = '🎊 欢聚时刻';
                        subtitle.dataset.updated = '1';
                    }
                    const footer = document.querySelector('.footer-hint');
                    if (footer && !footer.dataset.updated) {
                        footer.textContent = '同学们，好久不见！';
                        footer.dataset.updated = '1';
                    }
                    // 触发所有卡片弹跳
                    [daysNumEl, hoursNumEl, minutesNumEl, secondsNumEl].forEach(triggerBounce);
                    return;
                }

                const totalSeconds = Math.floor(diff / 1000);
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                const daysStr = padZero(days);
                const hoursStr = padZero(hours);
                const minutesStr = padZero(minutes);
                const secondsStr = padZero(seconds);

                // 更新DOM并检测变化
                if (prevValues.days !== days) {
                    daysNumEl.textContent = daysStr;
                    triggerBounce(daysNumEl);
                    prevValues.days = days;
                }
                if (prevValues.hours !== hours) {
                    hoursNumEl.textContent = hoursStr;
                    triggerBounce(hoursNumEl);
                    prevValues.hours = hours;
                }
                if (prevValues.minutes !== minutes) {
                    minutesNumEl.textContent = minutesStr;
                    triggerBounce(minutesNumEl);
                    prevValues.minutes = minutes;
                }
                if (prevValues.seconds !== seconds) {
                    secondsNumEl.textContent = secondsStr;
                    triggerBounce(secondsNumEl);
                    prevValues.seconds = seconds;
                }
            }

            // 初始更新
            updateCountdown();

            // 每秒更新
            const intervalId = setInterval(updateCountdown, 1000);

            // ============ 页面可见性处理 ============
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    // 页面隐藏时降低更新频率（通过清除interval，使用较慢的检查）
                    clearInterval(intervalId);
                } else {
                    // 页面重新可见时立即更新并恢复每秒更新
                    updateCountdown();
                    // 重新设置interval（注意：这里简单处理，实际生产中会用更健壮的方式）
                    // 由于intervalId已被清除，这里使用setTimeout递归方式
                }
            });

            // 使用更健壮的更新机制
            let visibilityInterval = intervalId;
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    clearInterval(visibilityInterval);
                } else {
                    updateCountdown();
                    visibilityInterval = setInterval(updateCountdown, 1000);
                }
            });

            // ============ 窗口大小变化时重建星空 ============
            let resizeDebounce;
            window.addEventListener('resize', () => {
                clearTimeout(resizeDebounce);
                resizeDebounce = setTimeout(() => {
                    createStars();
                }, 400);
            });

            // ============ 卡片点击涟漪效果 ============
            document.querySelectorAll('.countdown-card').forEach(card => {
                card.addEventListener('click', function(e) {
                    // 短暂高亮
                    this.style.borderColor = 'rgba(240,192,96,0.7)';
                    this.style.boxShadow =
                        '0 8px 32px rgba(0,0,0,0.3), 0 0 30px rgba(240,192,96,0.5), inset 0 1px 0 rgba(255,255,255,0.1)';
                    setTimeout(() => {
                        this.style.borderColor = '';
                        this.style.boxShadow = '';
                    }, 350);
                });
            });

            console.log('🎓 老同学聚会倒计时已就绪');
            console.log('📅 目标时间：2026年7月18日 中午12:00');
            console.log('⏳ 距离聚会还有 ' + Math.floor((targetTime - Date.now()) / (1000 * 60 * 60 * 24)) +
                ' 天');
            console.log('💡 提示：修改聚会日期请编辑JS中 targetDate 变量');
        })();
    </script>
</body>
</html>
